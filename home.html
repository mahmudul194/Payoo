<!DOCTYPE html>
<html data-theme="dark" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- Tailwind styles -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Payoo - Mobile Banking</title>
    <style>
        * {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class=" min-h-screen max-w-md bg-base-200 mx-auto">

    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">৳ <span id="balance">75000</span></h2>
                    <p class="text-white/50">available balance</p>
                </div>
            </div>
            <div class="right">
                <button id="logout-btn" class="btn btn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>Log
                    out</button>
            </div>
        </section>
    </header>
    <section class="w-11/12 mx-auto py-10 space-y-3">
        <h2 class="text-3xl font-bold">Welcome to pay<span class="text-primary">oo</span></h2>
        <p class="text-white/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

        <div class="buttons grid grid-cols-3 gap-3">
            <button onclick="ShowOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="ShowOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-2.png" alt="">
                <p>CashOut</p>
            </button>
            <button onclick="ShowOnly('send-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>
            <button onclick="ShowOnly('get-bonus')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-4.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button onclick="ShowOnly('pay-bill')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="ShowOnly('transactions')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="./assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <section id="add-money" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold">Add Money</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-white font-bold">Select a bank</label>
                        <select id="add-money-bank" class="select mb-5 rounded-full w-full">
                            <option disabled selected>Select Bank</option>
                            <option value="brac">Brac Bank</option>
                            <option value="city">City Bank</option>
                            <option value="dbbl">DBBL</option>
                            <option value="grameen">Grameen Bank</option>
                        </select>
                        <label class="label text-white font-bold">Bank Account Number</label>
                        <input id="add-money-bank-account" maxlength="11" minlength="11" type="tel"
                            class="input w-full rounded-full border-none bg-base-200" placeholder="Enter your 11 digit account number"
                            required />
                        <br>
                        <label class="label text-white font-bold">Amount to add</label>
                        <input id="add-money-amount" type="number" min="100" max="50000"
                            class="input w-full rounded-full border-none bg-base-200"
                            placeholder="Enter Amount to Add" required />
                        <br>
                        <label class="label text-white font-bold">Pin Number</label>
                        <input id="add-money-pin" type="password"
                            class="input w-full bg-base-200 border-none rounded-full" placeholder="Enter 4 digit pin"
                            required />
                        <button id="add-money-btn" class="btn mx-auto btn-primary w-full rounded-full mt-4">Add
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold">Cashout</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-white font-bold">Agent Number</label>
                        <input id="cashout-agent" maxlength="11" minlength="11" type="tel"
                            class="input w-full rounded-full border-none bg-base-200" placeholder="Enter your number"
                            required />
                        <br>
                        <label class="label text-white font-bold">Amount</label>
                        <input id="cashout-amount" type="number" min="100" max="50000"
                            class="input w-full rounded-full border-none bg-base-200"
                            placeholder="Enter Amount to withdraw" required />
                        <br>
                        <label class="label text-white font-bold">Pin Number</label>
                        <input id="cashout-pin" type="password"
                            class="input w-full bg-base-200 border-none rounded-full" placeholder="Enter 4 digit pin"
                            required />
                        <button id="cashout-btn" class="btn mx-auto btn-primary w-full rounded-full mt-4">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="send-money" class="w-11/12 mx-auto py-5 hidden">
         <h2 class="text-xl font-bold">Send Money</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-white font-bold">User Account Number</label>
                        <input id="send-money-user" maxlength="11" minlength="11" type="tel"
                            class="input w-full rounded-full border-none bg-base-200" placeholder="Enter 11 digit number"
                            required />
                        <br>
                        <label class="label text-white font-bold">Amount</label>
                        <input id="send-money-amount" type="number" min="100" max="50000"
                            class="input w-full rounded-full border-none bg-base-200"
                            placeholder="Enter Amount to Send" required />
                        <br>
                        <label class="label text-white font-bold">Pin Number</label>
                        <input id="send-money-pin" type="password"
                            class="input w-full bg-base-200 border-none rounded-full" placeholder="Enter 4 digit pin"
                            required />
                        <button id="send-money-btn" class="btn mx-auto btn-primary w-full rounded-full mt-4">Send
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="get-bonus" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold">Get Bonus</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-white font-bold">Bonus Code</label>
                        <input id="get-bonus-code" type="text"
                            class="input w-full rounded-full border-none bg-base-200" placeholder="Enter your bonus code"
                            required />
                            <button id="get-bonus-btn" class="btn mx-auto btn-primary w-full rounded-full mt-4">Get Bonus</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="pay-bill" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-xl font-bold">Pay Bill</h2>
        <div class="form pt-5">
            <div class="card bg-base-100 w-full shadow rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-white font-bold">Select a bank</label>
                        <select id="pay-bill-select" class="select mb-5 rounded-full w-full">
                            <option disabled selected>Select To Pay</option>
                            <option value="gas">Gas Bill</option>
                            <option value="electricity">Electricity Bill</option>
                            <option value="rent">Rent fee</option>
                            <option value="fee">school fee</option>
                        </select>
                        <label class="label text-white font-bold">Biller Account Number</label>
                        <input id="pay-bill-biller" maxlength="11" minlength="11" type="tel"
                            class="input w-full rounded-full border-none bg-base-200" placeholder="Enter your 11 digit account number"
                            required />
                        <br>
                        <label class="label text-white font-bold">Amount To Pay</label>
                        <input id="pay-bill-amount" type="number" min="100" max="50000"
                            class="input w-full rounded-full border-none bg-base-200"
                            placeholder="Enter Amount to pay" required />
                        <br>
                        <label class="label text-white font-bold">Pin Number</label>
                        <input id="pay-bill-pin" type="password"
                            class="input w-full bg-base-200 border-none rounded-full" placeholder="Enter 4 digit pin"
                            required />
                        <button id="pay-bill-btn" class="btn mx-auto btn-primary w-full rounded-full mt-4">Pay Bill</button>
                    </fieldset>
                </div>
            </div>
        </div>
    </section>

    <section id="transactions" class="w-11/12 mx-auto py-5 hidden">
        <h2 class="text-2xl font-bold mb-5">Transactions</h2>
        <div id="transactions-container" class="space-y-5">
        </div>
    </section>

    <script src="logout.js"></script>
    <script src="cashout.js"></script>
    <script src="machine.js"></script>
    <script src="addmoney.js"></script>
    <script src="bonus.js"></script>
    <script src="sendmoney.js"></script>
    <script src="paybill.js"></script>
</body>

</html>
